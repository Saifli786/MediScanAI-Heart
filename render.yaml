services:
  - type: web
    name: mediscanai-backend
    env: python
    buildCommand: pip install -r requirements.txt && python -c "from run import check_and_retrain_models; check_and_retrain_models()"
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.10.0
